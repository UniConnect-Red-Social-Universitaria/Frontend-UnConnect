name: CI (App & Web)

on:
  pull_request:
    branches: [ "main", "developer" ]
  push:
    branches: [ "main", "developer" ]

jobs:
  lint-and-type-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 🛒 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Build API types
        run: npm --workspace @uniconnect/api-types run build

      - name: 🔍 Lint Web (ESLint)
        working-directory: ./web
        run: npm run lint

      - name: ✅ Type check Web
        working-directory: ./web
        run: npx tsc --noEmit

      - name: ✅ Type check App
        working-directory: ./app
        run: npx tsc --noEmit || echo "Configure tsc in app if you want strict typing"

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: lint-and-type-check

    steps:
      - name: 🛒 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Build API types
        run: npm --workspace @uniconnect/api-types run build

      - name: 🧪 Run all tests with coverage
        run: npm run test:all -- --coverage

      - name: 🏗️ Build Web (Vite)
        working-directory: ./web
        run: npm run build

      - name: 📤 Upload coverage reports (Web)
        if: always()
        uses: codecov/codecov-action@v3
        with:
          flags: web-tests
          files: ./web/coverage/coverage-final.json
          fail_ci_if_error: false

      - name: 📤 Upload coverage reports (App)
        if: always()
        uses: codecov/codecov-action@v3
        with:
          flags: app-tests
          files: ./app/coverage/coverage-final.json
          fail_ci_if_error: false