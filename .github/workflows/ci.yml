name: CI (App & Web)

on:
  pull_request:
    branches: ["main", "developer"]
  push:
    branches: ["main", "developer"]

jobs:
  lint-and-type-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 🛒 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Build API types
        run: npm --workspace @uniconnect/api-types run build

      - name: 🔍 Lint Web (ESLint)
        working-directory: ./web
        run: npm run lint

      - name: ✅ Type check Web
        working-directory: ./web
        run: npx tsc --noEmit

      - name: ✅ Type check App
        working-directory: ./app
        run: npx tsc --noEmit || echo "Configure tsc in app if you want strict typing"

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: lint-and-type-check

    steps:
      - name: 🛒 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Build API types
        run: npm --workspace @uniconnect/api-types run build

      - name: 🧪 Run all tests with coverage
        run: npm run test:all -- --coverage

      - name: 🏗️ Build Web (Vite)
        working-directory: ./web
        run: npm run build

      - name: 📤 Upload coverage reports (Web)
        if: always()
        uses: codecov/codecov-action@v3
        with:
          flags: web-tests
          files: ./web/coverage/coverage-final.json
          fail_ci_if_error: false

      - name: 📤 Upload coverage reports (App)
        if: always()
        uses: codecov/codecov-action@v3
        with:
          flags: app-tests
          files: ./app/coverage/coverage-final.json
          fail_ci_if_error: false
  notify-pr-failure:
    name: Notify PR Failure on Slack
    runs-on: ubuntu-latest
    needs: [lint-and-type-check, build-and-test]
    if: always() && (needs.lint-and-type-check.result == 'failure' || needs.build-and-test.result == 'failure')
    timeout-minutes: 5
    steps:
      - name: ❌ Send Slack notification
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "❌ PR Checks Failed",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "❌ CI Checks Failed - PR #${{ github.event.pull_request.number }}"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Branch:*\n${{ github.head_ref || github.ref_name }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Target:*\n${{ github.base_ref || github.ref_name }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Commit:*\n<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Workflow:*\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Author:*\n${{ github.actor }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Job failures:*\nLint/Type: ${{ needs.lint-and-type-check.result }}\nBuild/Test: ${{ needs.build-and-test.result }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
        continue-on-error: true
  notify-success:
    name: Notify Success on Slack
    runs-on: ubuntu-latest
    needs: [lint-and-type-check, build-and-test]

    # Solo cuando TODO salió bien
    if: success() && github.event_name == 'push'

    timeout-minutes: 5

    steps:
      - name: ✅ Send Slack success notification
        uses: slackapi/slack-github-action@v1.24.0

        with:
          payload: |
            {
              "text": "✅ Deployment Checks Passed",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "✅ CI Passed on ${{ github.ref_name }}"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Branch:*\n${{ github.ref_name }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Author:*\n${{ github.actor }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Commit:*\n<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Workflow:*\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
                    }
                  ]
                }
              ]
            }

        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

        continue-on-error: true
