name: EAS Build Mobile (Preview)

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - 'packages/**'
      - '.github/workflows/eas-build.yml'

jobs:
  build:
    name: EAS Build Preview
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 🛒 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 🔐 Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Build API types
        run: npm --workspace @uniconnect/api-types run build

      - name: 📱 EAS Build for iOS & Android (Preview Profile)
        run: |
          eas build \
            --platform all \
            --profile preview \
            --non-interactive
        working-directory: ./app
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: 📝 Get Build URLs
        id: build-info
        run: |
          # Fetch latest build info from EAS
          BUILD_ID=$(eas build list --json | jq -r '.[0].id')
          BUILD_STATUS=$(eas build list --json | jq -r '.[0].status')
          BUILD_IOS_URL=$(eas build list --json | jq -r '.[0].artifacts.buildUrl // "N/A"')
          
          echo "build_id=$BUILD_ID" >> $GITHUB_OUTPUT
          echo "status=$BUILD_STATUS" >> $GITHUB_OUTPUT
          echo "ios_url=$BUILD_IOS_URL" >> $GITHUB_OUTPUT
          
          echo "✅ Build ID: $BUILD_ID"
          echo "✅ Status: $BUILD_STATUS"
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: 🚀 Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: app-preview-${{ github.run_number }}
          release_name: "Mobile App Preview - Build #${{ github.run_number }}"
          body: |
            ## 📱 Mobile App Preview Build
            
            **Build Information:**
            - Build ID: `${{ steps.build-info.outputs.build_id }}`
            - Status: `${{ steps.build-info.outputs.status }}`
            - Platform: iOS & Android
            - Profile: Preview
            
            **Download Links:**
            - iOS: ${{ steps.build-info.outputs.ios_url }}
            
            **Commit:** [${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
            
            **Triggered by:** @${{ github.actor }}
            
            ---
            
            🔗 View on EAS: https://expo.dev/accounts/${{ github.repository_owner }}/projects/uniconnect
          draft: false
          prerelease: true

      - name: ✅ Build Success Notification
        if: success()
        run: |
          echo "🎉 EAS Build completed successfully!"
          echo "Build ID: ${{ steps.build-info.outputs.build_id }}"
          echo "Status: ${{ steps.build-info.outputs.status }}"

      - name: ❌ Build Failure Notification
        if: failure()
        run: |
          echo "❌ EAS Build failed!"
          echo "Check logs at: https://expo.dev/accounts/${{ github.repository_owner }}/projects/uniconnect"
          exit 1

      - name: 📤 Upload Build Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eas-build-logs
          path: |
            ~/.eas/logs/
          retention-days: 30
