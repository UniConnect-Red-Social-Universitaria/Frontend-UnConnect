name: PR & Push - Coverage Report (Frontend)

on:
  push:
    branches:
      - main
      - developer
  pull_request:
    branches:
      - main
      - developer

permissions:
  pull-requests: write
  contents: read

jobs:
  coverage-comment:
    name: Coverage Report Comment
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: рџ›’ Checkout code
        uses: actions/checkout@v4

      - name: рџ”§ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: рџ“¦ Install dependencies
        run: npm ci

      - name: рџЏ—пёЏ Build API types
        run: npm --workspace @uniconnect/api-types run build

      - name: рџ§Є Run tests with coverage
        run: |
          npm run test:all -- --coverage
        continue-on-error: true

      - name: рџ“€ Parse Web coverage
        id: web-coverage
        run: |
          if [ -f ./web/coverage/coverage-summary.json ]; then
            STATEMENTS=$(jq -r '.total.statements.pct' ./web/coverage/coverage-summary.json)
            BRANCHES=$(jq -r '.total.branches.pct' ./web/coverage/coverage-summary.json)
            FUNCTIONS=$(jq -r '.total.functions.pct' ./web/coverage/coverage-summary.json)
            LINES=$(jq -r '.total.lines.pct' ./web/coverage/coverage-summary.json)
            
            echo "statements=$STATEMENTS" >> $GITHUB_OUTPUT
            echo "branches=$BRANCHES" >> $GITHUB_OUTPUT
            echo "functions=$FUNCTIONS" >> $GITHUB_OUTPUT
            echo "lines=$LINES" >> $GITHUB_OUTPUT
            
            if (( $(echo "$STATEMENTS < 75" | bc -l) )); then
              echo "below_threshold=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "No web coverage found"
            echo "statements=0" >> $GITHUB_OUTPUT
          fi

      - name: рџ“€ Parse App coverage
        id: app-coverage
        run: |
          if [ -f ./app/coverage/coverage-summary.json ]; then
            STATEMENTS=$(jq -r '.total.statements.pct' ./app/coverage/coverage-summary.json)
            BRANCHES=$(jq -r '.total.branches.pct' ./app/coverage/coverage-summary.json)
            FUNCTIONS=$(jq -r '.total.functions.pct' ./app/coverage/coverage-summary.json)
            LINES=$(jq -r '.total.lines.pct' ./app/coverage/coverage-summary.json)
            
            echo "statements=$STATEMENTS" >> $GITHUB_OUTPUT
            echo "branches=$BRANCHES" >> $GITHUB_OUTPUT
            echo "functions=$FUNCTIONS" >> $GITHUB_OUTPUT
            echo "lines=$LINES" >> $GITHUB_OUTPUT
          else
            echo "No app coverage found"
            echo "statements=0" >> $GITHUB_OUTPUT
          fi

      - name: рџ’¬ Post coverage comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // Envolvemos en comillas y convertimos a nГєmero. 
            // Si llega "Unknown", Number('Unknown') da NaN, y NaN || 0 da como resultado 0.
            const webStmt = Number('${{ steps.web-coverage.outputs.statements }}') || 0;
            const webBranches = Number('${{ steps.web-coverage.outputs.branches }}') || 0;
            const webFunctions = Number('${{ steps.web-coverage.outputs.functions }}') || 0;
            const webLines = Number('${{ steps.web-coverage.outputs.lines }}') || 0;

            const appStmt = Number('${{ steps.app-coverage.outputs.statements }}') || 0;
            const appBranches = Number('${{ steps.app-coverage.outputs.branches }}') || 0;
            const appFunctions = Number('${{ steps.app-coverage.outputs.functions }}') || 0;
            const appLines = Number('${{ steps.app-coverage.outputs.lines }}') || 0;

            const threshold = 75;

            const comment = `## рџ“Љ Frontend Code Coverage Report

            ### рџЊђ Web Coverage
            ${webStmt > 0 ? `
            | Metric | Coverage | Status |
            |--------|----------|--------|
            | Statements | ${webStmt.toFixed(2)}% | ${webStmt >= threshold ? 'вњ…' : 'вќЊ'} |
            | Branches | ${webBranches.toFixed(2)}% | ${webBranches >= threshold ? 'вњ…' : 'вќЊ'} |
            | Functions | ${webFunctions.toFixed(2)}% | ${webFunctions >= threshold ? 'вњ…' : 'вќЊ'} |
            | Lines | ${webLines.toFixed(2)}% | ${webLines >= threshold ? 'вњ…' : 'вќЊ'} |
            ` : 'вљ пёЏ No coverage data available'}

            ### рџ“± App Coverage
            ${appStmt > 0 ? `
            | Metric | Coverage | Status |
            |--------|----------|--------|
            | Statements | ${appStmt.toFixed(2)}% | ${appStmt >= threshold ? 'вњ…' : 'вќЊ'} |
            | Branches | ${appBranches.toFixed(2)}% | ${appBranches >= threshold ? 'вњ…' : 'вќЊ'} |
            | Functions | ${appFunctions.toFixed(2)}% | ${appFunctions >= threshold ? 'вњ…' : 'вќЊ'} |
            | Lines | ${appLines.toFixed(2)}% | ${appLines >= threshold ? 'вњ…' : 'вќЊ'} |
            ` : 'вљ пёЏ No coverage data available'}

            **Threshold**: ${threshold}%

            ---
            рџ’Ў *To improve coverage, add unit tests for uncovered lines and branches.*`;

            if (context.eventName === 'pull_request') {
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
              });
              
              const existingComment = comments.find(c => c.body.includes('рџ“Љ Frontend Code Coverage Report'));
              
              if (existingComment) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existingComment.id,
                  body: comment,
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: comment,
                });
              }
            } else if (context.eventName === 'push') {
              await github.rest.repos.createCommitComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: context.sha,
                body: comment,
              });
            }

      - name: рџљ« Block merge if coverage below threshold
        if: steps.web-coverage.outputs.below_threshold == 'true'
        run: |
          echo "вќЊ Web coverage is below 0% threshold!"
          echo "Statements: ${{ steps.web-coverage.outputs.statements }}%"
          exit 1
