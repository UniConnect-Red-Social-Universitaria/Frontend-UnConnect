name: Deploy Web to Fly.io

on:
  push:
    branches:
      - main
    paths:
      - 'web/**'
      - 'packages/**' # Agregamos esto por si cambian los tipos
      - 'fly.toml'
      - '.github/workflows/fly-deploy.yml'

jobs:
  deploy:
    name: Deploy Web
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm install

      - name: Generar tipos de la API
        run: npm run generate:api-types

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: |
          flyctl deploy --remote-only \
            --build-arg EXPO_PUBLIC_API_URL="https://uniconnect-backend.fly.dev" \
            --build-arg EXPO_PUBLIC_ALLOWED_DOMAIN="ucaldas.edu.co" \
            --build-arg EXPO_PUBLIC_AUTH0_CONNECTION="google-oauth2"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}