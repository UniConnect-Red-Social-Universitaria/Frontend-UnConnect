name: Deploy Web to Fly.io

on:
  push:
    branches:
      - main
    # Opcional: Solo desplegar si hay cambios en web/ o fly.toml
    paths:
      - 'web/**'
      - 'fly.toml'
      - '.github/workflows/fly-deploy.yml'

jobs:
  deploy:
    name: Deploy Web
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: |
          flyctl deploy --remote-only \
            --build-arg EXPO_PUBLIC_API_URL="https://uniconnect-backend.fly.dev" \
            --build-arg EXPO_PUBLIC_ALLOWED_DOMAIN="ucaldas.edu.co" \
            --build-arg EXPO_PUBLIC_AUTH0_CONNECTION="google-oauth2"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}